<!DOCTYPE html>
<html>
<head>
    <title>Farmer Market</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Farmer Market</a>

        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-2">Hello, {{ user.username }}</span>

                <a href="/orders/" class="btn btn-info">My Orders</a>   <!-- ✅ ये add -->

                <a href="/logout/" class="btn btn-danger">Logout</a>
            {% else %}
                <a href="/login/" class="btn btn-light">Login</a>
                <a href="/signup/" class="btn btn-warning">Signup</a>
            {% endif %}
        </div>
    </div>
</nav>


<!-- Products -->
<div class="container mt-4">
    <div class="row">

        {% for product in products %}
        <div class="col-md-4">
            <div class="card mb-4">

                <img src="{{ product.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">


                <div class="card-body">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p>Price: ₹{{ product.price }}</p>
                    <p>Quantity: {{ product.quantity }}</p>

                    <a href="/order/{{ product.id }}/" class="btn btn-success">
                        Buy Now
                    </a>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
